services:
  # --- Edge load balancer -------------------------------------------------
  # Nginx sits in front of the `app` replicas and round-robins traffic.
  # This is the only service you expose to the host.
  lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${LB_PORT:-8080}:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/lb-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  # --- Application (scale me!) --------------------------------------------
  # NOTE: no host `ports` mapping here on purpose — replicas share the port
  # internally and are reached only through `lb`. Scale with:
  #   docker compose up -d --scale app=3
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-604800}
      # Bun.sql reads DATABASE_URL by convention.
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
    depends_on:
      postgres:
        condition: service_healthy
    # healthcheck:
    #   test:
    #     - CMD
    #     - bun
    #     - --eval
    #     - "await fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
    #   interval: 30s
    #   timeout: 3s
    #   start_period: 5s
    #   retries: 3

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
