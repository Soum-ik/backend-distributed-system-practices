# ============================================================================
#  Nginx load balancer
#  Sits at the edge (:8080) and spreads traffic across the `app` replicas.
#  See ./README.md for how to run, scale, and experiment.
# ============================================================================

worker_processes auto;              # one worker per CPU core

events {
  worker_connections 1024;          # max simultaneous connections per worker
}

http {

  # --------------------------------------------------------------------------
  #  1. Logging
  #     Custom format shows WHICH backend served each request + timings.
  # --------------------------------------------------------------------------
  log_format lb '$remote_addr -> $upstream_addr | $request | '
                'status=$status req_time=${request_time}s '
                'upstream_time=${upstream_response_time}s';

  access_log /var/log/nginx/access.log lb;
  error_log  /var/log/nginx/error.log  warn;

  # --------------------------------------------------------------------------
  #  2. Backend pool
  #     `app` is the Docker Compose service name. Compose DNS resolves it to
  #     every replica's IP, so Nginx balances across all of them.
  #
  #     Strategy — pick ONE (currently: least_conn):
  #       round-robin  → default, even rotation      (delete the line below)
  #       least_conn   → send to the least-busy node (good for uneven work)
  #       ip_hash      → sticky per client IP
  # --------------------------------------------------------------------------
  upstream backend {
    least_conn;

    # max_fails / fail_timeout = passive health check:
    # eject a node after 3 failures, retry it after 10s.
    # server app:3000 max_fails=3 fail_timeout=10s;
    server app:3000;

    keepalive 32;                   # reuse upstream connections (faster)
  }

  # --------------------------------------------------------------------------
  #  3. Server — the public entry point
  # --------------------------------------------------------------------------
  server {
    listen 8080;
    server_name _;

    # On a failed/slow backend, retry the next one (dead nodes stay invisible).
    proxy_next_upstream       error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_connect_timeout     2s;
    proxy_read_timeout        30s;

    # --- LB's own health (does NOT touch the backends) ---
    location = /lb-health {
      access_log off;
      add_header  Content-Type text/plain;
      return 200 "load-balancer ok\n";
    }

    # --- Everything else → the backend pool ---
    location / {
      proxy_pass http://backend;

      # Required for upstream keepalive to work.
      proxy_http_version 1.1;
      proxy_set_header   Connection "";

      # Preserve the real client info for the app behind the proxy.
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Debug header: shows which backend answered (handy while learning).
      add_header         X-Upstream        $upstream_addr always;
    }
  }
}
